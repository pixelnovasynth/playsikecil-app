<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaySiKecil Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- CSS VARIABLES & PALETTE (Pastel/Foamy Theme) --- */
        :root {
            --bg-sky: #a1c4fd;
            --bg-cloud: #c2e9fb;
            --primary-btn: #ffb7b2; /* Pastel Pink */
            --primary-btn-active: #ffdac1; /* Pastel Orange */
            --secondary-btn: #e2f0cb; /* Pastel Green */
            --text-dark: #5c4b51;
            --card-bg: rgba(255, 255, 255, 0.85);
            --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* --- GLOBAL STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--bg-sky) 0%, var(--bg-cloud) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Keep it app-like */
            color: var(--text-dark);
            position: relative;
        }

        /* --- DECORATIVE CLOUDS --- */
        .clouds-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .cloud {
            background: white;
            border-radius: 100px;
            position: absolute;
            opacity: 0.6;
            animation: drift linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud1 {
            width: 150px; height: 50px; top: 10%; left: -20%;
            animation-duration: 25s;
        }
        .cloud1::before { width: 70px; height: 70px; top: -30px; left: 20px; }
        .cloud1::after { width: 90px; height: 90px; top: -40px; right: 20px; }
        
        .cloud2 {
            width: 200px; height: 60px; top: 60%; left: -30%;
            animation-duration: 35s; animation-delay: -10s;
        }
        .cloud2::before { width: 80px; height: 80px; top: -40px; left: 30px; }
        .cloud2::after { width: 100px; height: 100px; top: -50px; right: 30px; }

        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        /* --- APP CONTAINER --- */
        #app {
            width: 100%;
            max-width: 480px; /* Mobile first */
            height: 100vh;
            max-height: 900px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 481px) {
            #app { height: 90vh; border: 5px solid white; }
        }

        /* --- VIEWS --- */
        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            width: 100%;
            height: 100%;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }
        .view.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- TYPOGRAPHY & HEADINGS --- */
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 0px #ffb7b2, -2px -2px 0px #a1c4fd;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        h2 { font-size: 1.8rem; margin-bottom: 15px; }
        p { font-size: 1.1rem; margin-bottom: 25px; font-weight: 700; }

        /* --- FOAMY FLOATING BUTTONS --- */
        .btn-foamy {
            background-color: var(--primary-btn);
            color: var(--text-dark);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1), inset 0 -4px 0 rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            animation: float 3s ease-in-out infinite;
            margin: 10px;
            outline: none;
        }

        /* Float animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* On Click (Pressed effect + color change) */
        .btn-foamy:active {
            animation: none; /* Stop floating while pressed */
            transform: scale(0.92) translateY(5px);
            background-color: var(--primary-btn-active);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1), inset 0 2px 0 rgba(0,0,0,0.05);
        }

        .btn-secondary {
            background-color: var(--secondary-btn);
            animation-delay: 0.5s; /* stagger animation */
        }
        .btn-secondary:active { background-color: #c1e1a7; }

        /* --- DASHBOARD GRID --- */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px;
        }
        .user-badge {
            background: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            overflow-y: auto;
            padding-bottom: 20px;
            /* Hide scrollbar */
            scrollbar-width: none;
        }
        .grid::-webkit-scrollbar { display: none; }

        .category-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-soft);
            border: 3px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            animation: float 4s ease-in-out infinite;
        }
        .category-card:nth-child(even) { animation-delay: 1s; }
        
        .category-card:active {
            animation: none;
            transform: scale(0.9);
            background: var(--secondary-btn);
            border-color: white;
        }

        .card-icon { font-size: 3rem; margin-bottom: 10px; }
        .card-title { font-size: 1rem; font-weight: 900; }

    </style>
</head>
<body>

    <div class="clouds-container">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
    </div>

    <div id="app">

        <section id="splash-view" class="view active">
            <h1>PlaySiKecil<br>Academy</h1>
            <p>Belajar Sambil Bermain!<br>Learn Through Play!</p>
            <img src="https://api.iconify.design/noto:lion.svg" alt="Mascot" style="width: 120px; margin-bottom: 30px; animation: float 2.5s ease-in-out infinite;">
            
            <button class="btn-foamy" onclick="setLanguage('ms')">Bahasa Melayu</button>
            <button class="btn-foamy btn-secondary" onclick="setLanguage('en')">English</button>
        </section>

        <section id="dashboard-view" class="view">
            <div class="header">
                <div class="user-badge">
                    <span>🦁</span> <span id="user-name">Si Kecil</span>
                </div>
                <div class="user-badge" style="background: #fff3cd;">
                    <span>⭐</span> <span id="star-count">0</span>
                </div>
            </div>
            <h2 id="dash-title">Mari Belajar!</h2>
            <div class="grid" id="category-grid">
                </div>
            <button class="btn-foamy" style="margin-top: 20px; padding: 10px 20px;" onclick="navigate('splash-view')">⚙️ Settings</button>
        </section>

        <section id="activity-view" class="view">
            <h1 id="activity-title">Activity</h1>
            <div style="font-size: 5rem; margin: 20px 0; animation: float 2s infinite;" id="activity-icon">🎨</div>
            <p id="activity-desc">Pilih aktiviti anda</p>
            <button class="btn-foamy" onclick="addStar()">🌟 Siap! (Dapat Bintang)</button>
            <button class="btn-foamy btn-secondary" onclick="navigate('dashboard-view')">⬅️ Kembali</button>
        </section>

    </div>

    <script>
        // --- 1. STATE MANAGEMENT & LOCAL STORAGE ---
        // Load existing data or set defaults
        let appData = JSON.parse(localStorage.getItem('psk_data')) || {
            lang: 'ms',
            stars: 0,
            childName: 'Cakka' // using name from provided design inspiration
        };

        // --- 2. JSON DATABASE (Coding Rules: Dynamic) ---
        const db = {
            categories: [
                { id: 'animals', icon: '🦁', name: { ms: 'Haiwan', en: 'Animals' } },
                { id: 'fruits', icon: '🍎', name: { ms: 'Buah', en: 'Fruits' } },
                { id: 'numbers', icon: '🔢', name: { ms: 'Nombor', en: 'Numbers' } },
                { id: 'colors', icon: '🎨', name: { ms: 'Warna', en: 'Colours' } },
                { id: 'shapes', icon: '⭐', name: { ms: 'Bentuk', en: 'Shapes' } },
                { id: 'vehicles', icon: '🚗', name: { ms: 'Kenderaan', en: 'Vehicles' } }
            ]
        };

        // --- 3. CORE FUNCTIONS ---

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('psk_data', JSON.stringify(appData));
            updateUI();
        }

        // Navigation between views
        function navigate(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // Set Language and proceed to dashboard
        function setLanguage(lang) {
            appData.lang = lang;
            saveData();
            buildDashboard();
            navigate('dashboard-view');
        }

        // Add a star (Gamification/Rewards)
        function addStar() {
            appData.stars += 1;
            saveData();
            alert(appData.lang === 'ms' ? 'Tahniah! Anda dapat 1 Bintang!' : 'Excellent! You got 1 Star!');
            navigate('dashboard-view');
        }

        // Open an activity
        function openActivity(categoryId) {
            const category = db.categories.find(c => c.id === categoryId);
            document.getElementById('activity-title').innerText = category.name[appData.lang];
            document.getElementById('activity-icon').innerText = category.icon;
            document.getElementById('activity-desc').innerText = appData.lang === 'ms' ? 'Mari belajar bersama!' : 'Let us learn together!';
            navigate('activity-view');
        }

        // --- 4. RENDER ENGINE ---

        // Update header info (stars, name)
        function updateUI() {
            document.getElementById('user-name').innerText = appData.childName;
            document.getElementById('star-count').innerText = appData.stars;
            document.getElementById('dash-title').innerText = appData.lang === 'ms' ? 'Pilih Kategori' : 'Choose Category';
        }

        // Dynamically build the category grid based on JSON
        function buildDashboard() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = ''; // Clear existing

            db.categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.onclick = () => openActivity(cat.id);
                
                card.innerHTML = `
                    <div class="card-icon">${cat.icon}</div>
                    <div class="card-title">${cat.name[appData.lang]}</div>
                `;
                grid.appendChild(card);
            });
            
            updateUI();
        }

        // Initialize on load
        window.onload = () => {
            updateUI();
            // Optional: skip splash if already has language set (for now we always show splash)
        };
    </script>
</body>
</html>
